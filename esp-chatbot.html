<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESP Ultrasound Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Aptos, "Aptos Display", "Segoe UI", Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(rgba(6, 10, 35, 0.56), rgba(6, 10, 35, 0.56)),
        url("./assets/bg.png")
        center center / cover no-repeat fixed;
      padding: 24px;
    }

    .chat-widget {
      position: fixed;
      right: 24px;
      bottom: 88px;
      width: min(92vw, 390px);
      max-height: min(78vh, 620px);
      display: flex;
      flex-direction: column;
      gap: 0;
      opacity: 1;
      transform: translateY(0) scale(1);
      transform-origin: bottom right;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 40;
    }

    .chat-widget.closed {
      pointer-events: none;
      opacity: 0;
      transform: translateY(14px) scale(0.96);
    }

    .chat-header {
      background: #003366;
      color: white;
      border-radius: 16px 16px 0 0;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chat-header .avatar {
      width: 44px;
      height: 44px;
      background: #0b4b96;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .chat-header .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-header .info h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header .info p {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4cde80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }


    .chat-box {
      background: white;
      border-left: 1px solid #dde3ea;
      border-right: 1px solid #dde3ea;
      min-height: 130px;
      max-height: min(360px, 42vh);
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.bot .bubble {
      background: #f0f4f8;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: #003366;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message .icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      align-self: flex-end;
    }

    .message.bot .icon { background: #003366; color: white; font-size: 14px; }
    .message.user .icon { background: #cce0ff; font-size: 14px; }

    .message.bot .icon {
      overflow: hidden;
      padding: 0;
    }

    .message.bot .icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .typing .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
    }

    .typing .dot {
      width: 7px; height: 7px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 14px;
      background: white;
      border-left: 1px solid #dde3ea;
      border-right: 1px solid #dde3ea;
    }

    .suggestion-btn {
      background: #e8f0fe;
      color: #003366;
      border: 1px solid #c5d8f8;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .suggestion-btn:hover { background: #c5d8f8; }

    .chat-footer {
      background: white;
      border: 1px solid #dde3ea;
      border-top: none;
      border-radius: 0 0 16px 16px;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .chat-footer textarea {
      flex: 1;
      border: 1px solid #dde3ea;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.4;
    }

    .chat-footer textarea:focus { border-color: #003366; }

    .send-btn {
      background: #003366;
      color: white;
      border: none;
      border-radius: 12px;
      width: 42px;
      height: 42px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn:hover { background: #004488; }
    .send-btn:disabled { background: #aaa; cursor: not-allowed; }

    .send-btn svg { width: 18px; height: 18px; fill: white; }

    .powered-by {
      display: none;
    }

    .chat-launcher {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 58px;
      height: 58px;
      border: none;
      border-radius: 50%;
      background: #003366;
      color: white;
      font-size: 24px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .chat-launcher:hover {
      background: #004488;
      transform: translateY(-2px);
    }

    .chat-launcher.open {
      background: #0f2852;
    }

    .inline-action-btn {
      border: 1px solid #003366;
      background: #eef5ff;
      color: #003366;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .inline-action-btn:hover {
      background: #dce9ff;
    }

    .bot-actions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 600px) {
      .chat-widget {
        right: 12px;
        left: 12px;
        width: auto;
        bottom: 82px;
      }

      .chat-launcher {
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="chat-widget closed" id="chatWidget">

    <!-- Header -->
    <div class="chat-header">
      <div class="avatar"><img id="botAvatarHeader" alt="ESP logo"></div>
      <div class="info">
        <h2>ESP Support Chat</h2>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-box" id="chatBox">
      <div class="message bot">
        <div class="icon"><img id="botAvatarWelcome" alt="ESP logo"></div>
        <div class="bubble">
          Hi! I'm the ESP Ultrasound Assistant. I can answer questions about our webinars, X-ZONE, exams, refunds, and more. How can I help you today?
        </div>
      </div>
    </div>

    <!-- Suggestion chips -->
    <div class="suggestions" id="suggestions">
      <button class="suggestion-btn" onclick="sendSuggestion(this)">What's included in registration?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">When do I get my workbook?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">What is X-ZONE?</button>
      <button class="suggestion-btn" onclick="sendSuggestion(this)">Can I get a refund?</button>
    </div>

    <!-- Input -->
    <div class="chat-footer">
      <textarea id="userInput" rows="1" placeholder="Type your question…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>

    <!-- <div class="powered-by">Powered by Claude AI</div> -->
  </div>
  <button class="chat-launcher" id="chatLauncher" onclick="toggleChat()" aria-label="Open chat">💬</button>

  <script>
    const BOT_AVATAR = "./assets/avatar.png";

    const KNOWLEDGE_BASE = [
      {
        id: 'greeting',
        patterns: ['hi', 'hello', 'hey', 'good morning', 'good afternoon', 'good evening', 'yo'],
        responses: [
          'Hi! I can help with webinar dates, course options, pricing, X-ZONE, textbooks, digital quiz cards, video case studies, on-demand CMEs, and refund/transfer policy. What do you want to check first?',
          'Hey! Ask me anything about ESP webinars, study tools, X-ZONE access, pricing, and policies.',
          'Welcome! I can guide you on schedule, registration, X-ZONE, textbooks, CMEs, and more.'
        ]
      },
      {
        id: 'next_webinar',
        patterns: [
          'next webinar', 'upcoming webinar', 'when is the next course', 'next class date',
          'webinar schedule', 'when is spi webinar', 'what dates are available', 'when is next class',
          'whens the next webinar', 'next dates'
        ],
        responses: [
          'The next listed webinar session is May 15-17. ESP also has later sessions (for example June 20-21 and July 11-12 for selected courses). If you tell me your specialty, I can help narrow the best date.',
          'The next webinar block is May 15-17. After that, selected courses run again in June and July.',
          'Next available session is May 15-17. Share your course and I can match you to the closest date.'
        ]
      },
      {
        id: 'registration_includes',
        patterns: [
          'what is included', 'registration includes', 'what comes with registration',
          'what comes with webinar', 'what do i receive', 'what do i get with registration',
          'what do i get when i register', 'what do i get with my webinar'
        ],
        responses: [
          'Registration includes a mailed workbook, live interactive webinar access, 6 weeks of X-ZONE practice questions, and 12 SDMS Continuing Education Credits.',
          'With registration, you get your workbook, live webinar seat, 6 weeks of X-ZONE, and 12 SDMS CME credits.',
          'Each registration includes: workbook + live review webinar + 6-week X-ZONE access + 12 CME credits.'
        ]
      },
      {
        id: 'workbook_shipping',
        patterns: [
          'when will i receive workbook', 'workbook shipping', 'when does workbook arrive',
          'where is my workbook', 'ship my workbook', 'when do i get my workbook'
        ],
        responses: [
          'Workbooks typically arrive about 1-2 weeks before the webinar. Shipping is in registration order, and tracking is sent by email.',
          'Workbook shipping starts ahead of the webinar, in registration order. If you register early, yours typically ships earlier.',
          'ESP mails workbooks before the event and prioritizes by registration date; tracking info is emailed.'
        ]
      },
      {
        id: 'xzone',
        patterns: [
          'what is x-zone', 'xzone', 'practice platform', 'activate x-zone', 'how long is x-zone',
          'online practice questions', 'whats the xzone', 'x zone access', 'how can i get xzone',
          'where do i buy xzone', 'how do i register for xzone', 'get xzone'
        ],
        responses: [
          'X-ZONE is ESP’s online bank of registry-style practice questions organized by exam topic so you can target weak areas and build speed.',
          'You can get X-ZONE under Study Tools on ESP. Standalone access is 1-day ($39), 5-day ($79), or 15-day ($109). If you register for a webinar, 6 weeks of X-ZONE is included.',
          'To access X-ZONE, go to Study Tools > X-ZONE and choose a subscription length (1, 5, or 15 days). Webinar registration also includes 6 weeks of access.',
          'X-ZONE is ESP’s question bank. You can purchase it directly from Study Tools, or get 6-week access included with webinar registration (activate within 9 months).'
        ]
      },
      {
        id: 'exam_timing',
        patterns: [
          'when should i take exam', 'when do i test', 'after webinar when exam',
          'best time for exam', 'how long after webinar'
        ],
        responses: [
          'Most people do best taking the exam after a short review period: roughly a couple of weeks up to about 2-3 months after the webinar.',
          'A good target is a few weeks to about 3 months after the webinar, after you review notes and X-ZONE.',
          'Usually best not immediately and not too late; aim for a focused review window up to about 2-3 months.'
        ]
      },
      {
        id: 'after_pass',
        patterns: [
          'after i pass', 'i passed now what', 'free shirt', 'tshirt', 'send testimonial',
          'headshot pass result'
        ],
        responses: [
          'After you pass, email your headshot, passing result, and a short testimonial to info@esp-inc.com. ESP will send you a complimentary t-shirt.',
          'Once you pass, send your pass result + headshot + testimonial to info@esp-inc.com for the ESP t-shirt.',
          'Celebrate with ESP: email your passing result and headshot to info@esp-inc.com and include a short testimonial.'
        ]
      },
      {
        id: 'refund_transfer',
        patterns: [
          'refund', 'cancel registration', 'reschedule', 'transfer course', 'money back',
          'refund policy'
        ],
        responses: [
          "Transfers within the same calendar year are free. Refunds (minus a $50 fee) are available only if your workbook has not shipped and X-ZONE has not been activated.",
          "Need to change plans? Same-year transfers are free. Refunds are possible (less $50) only before workbook shipment and before X-ZONE activation.",
          "Refund eligibility depends on two things: workbook not shipped and X-ZONE not activated. Otherwise refunds are not available."
        ]
      },
      {
        id: 'recording_policy',
        patterns: [
          'can i record', 'audio tape', 'video recording', 'record webinar', 'save webinar recording'
        ],
        responses: [
          'Recording webinars (audio or video) is not allowed under the Terms of Use.',
          'Audio/video recording is prohibited for ESP webinars.',
          'No recording is allowed during the webinar per ESP Terms of Use.'
        ]
      },
      {
        id: 'textbook_required',
        patterns: [
          'need textbook', 'is textbook required', 'understanding ultrasound physics required',
          'do i need the book', 'is the textbook required for webinar'
        ],
        responses: [
          'The textbook is helpful but not required to complete the webinar prep course.',
          'No, the textbook is optional for webinar completion.',
          'You do not need the textbook to take the webinar, but many learners use it as extra support.'
        ]
      },
      {
        id: 'textbooks',
        patterns: [
          'textbook', 'textbooks', 'what are the textbooks', 'whats the textbook',
          'book options', 'study books', 'understanding ultrasound physics', 'art of vascular ultrasound'
        ],
        responses: [
          'Understanding Ultrasound Physics (4th Edition) is $129; The Art of Vascular Ultrasound is $175. Bulk orders: 5–10 books 5% off; 11–20 books 15% off; 21+ books 25% off.',
          'ESP’s main textbooks are UUP ($129) and The Art of Vascular Ultrasound ($175), with bulk discounts at 5%, 15%, and 25% by quantity tier.',
          'Textbook list prices are $129 (UUP) and $175 (vascular). Volume discounts apply for bulk orders.'
        ]
      },
      {
        id: 'study_tools',
        patterns: [
          'study tools', 'what tools do you have', 'digital products', 'practice resources',
          'quiz cards', 'video case studies', 'what does esp offer besides webinars'
        ],
        responses: [
          'ESP study tools include X-ZONE practice questions, Digital Quiz Cards (Brainscape, $59 for 90 days), Adult Echo Digital Video Case Studies ($159 first year), textbooks, and On-Demand CMEs.',
          'Study Tools includes X-ZONE, Digital Quiz Cards, textbooks, and Adult Echo Video Case Studies; CMEs are also available on-demand.',
          'Beyond webinars, ESP offers X-ZONE, quiz cards, video case studies, textbooks, and on-demand CME options.'
        ]
      },
      {
        id: 'quiz_cards',
        patterns: [
          'digital quiz cards', 'quiz cards', 'brainscape', 'flash cards', 'spaced repetition'
        ],
        responses: [
          'Digital Quiz Cards use Brainscape spaced repetition. Pricing is $59 per course for 90-day access, with offerings across the registry specialties.',
          'Quiz Cards are delivered on Brainscape and cost $59 per course for 90 days.',
          'ESP Digital Quiz Cards are spaced-repetition cards on Brainscape, priced at $59/course (90-day access).'
        ]
      },
      {
        id: 'video_cases',
        patterns: [
          'video case studies', 'adult echo test and learn', 'adult echo digital cases',
          'echo videos', 'learning in motion'
        ],
        responses: [
          'Adult Echo Test & Learn includes 90+ cardiac pathologies and 190+ video clips in 13 categories. Price is $159 for the first year, then $11.99 annual renewal.',
          'Adult Echo Video Case Studies are $159 for year one, then $11.99/year to renew.',
          'The Adult Echo digital cases include 190+ clips and cost $159 for the first year.'
        ]
      },
      {
        id: 'courses',
        patterns: [
          'what courses do you offer', 'course list', 'specialties available',
          'which review courses', 'courses', 'course options'
        ],
        responses: [
          'ESP offers review courses in Ultrasound Physics, Abdominal, Adult Echo, Breast, Fetal Echo, Musculoskeletal, OB/GYN, Pediatric Echo, Pediatric Sonography, and Vascular Technology.',
          'Course lineup includes SPI physics, abdominal, adult echo, OB/GYN, vascular, breast, fetal echo, pediatric echo, pediatric, and MSK.',
          'ESP has 10 main review specialties across physics, echo, vascular, OB/GYN, pediatric, and more.'
        ]
      },
      {
        id: 'pricing',
        patterns: [
          'pricing', 'course price', 'webinar price', 'bundle save',
          'how much is a webinar', 'how much for a webinar', 'how much does a webinar',
          'how much is the webinar', 'how much for the webinar', 'how much to register',
          'how much is a course', 'how much for a course',
          'cost of webinar', 'webinar cost', 'cost of a course', 'course cost'
        ],
        responses: [
          'Webinar pricing: Core courses $325, Specialty courses $375, and MSK MD-led course $450. Bundle pricing can save $50 per course when registering for both AM and PM courses in the same 3-day session.',
          'Price ranges are typically $325 to $450 depending on course type. Bundle sessions can reduce price by $50 per course.',
          'Core courses are $325, specialty courses are $375, and the MD-led MSK course is $450.'
        ]
      },
      {
        id: 'cmes',
        patterns: [
          'cme', 'continuing education', 'on demand cme', 'credits available', 'on-demand cmes'
        ],
        responses: [
          'ESP offers live webinar CME credit (12 SDMS CMEs per course) and On-Demand CMEs with self-paced courses (typically 1 to 7.5 credits) and a 90-day completion window. Webinar CME certificates are usually available around 2 weeks after the webinar.',
          'You can earn CMEs through live webinars or On-Demand CME courses you complete on your own schedule.',
          'CME options include 12-credit live webinar courses and on-demand modules with a 90-day access window.'
        ]
      },
      {
        id: 'ama_credits',
        patterns: [
          'ama', 'ama pra', 'physician credit', 'category 1 credit'
        ],
        responses: [
          'If you need AMA PRA Category 1 Credits, ESP lists an add-on option of $100 per weekend for eligible sessions.',
          'AMA PRA Category 1 credit is available as an add-on for eligible weekends ($100/weekend).',
          'For physician credit, ESP lists an AMA PRA Category 1 add-on priced at $100 per weekend.'
        ]
      },
      {
        id: 'contact',
        patterns: [
          'contact', 'phone number', 'email support', 'help desk', 'reach esp'
        ],
        responses: [
          'You can reach ESP support at info@esp-inc.com for registration, transfers, refund requests, and general help.',
          'Best contact is info@esp-inc.com for support, scheduling, and registration issues.',
          'For direct help, email info@esp-inc.com.'
        ]
      },
      {
        id: 'live_agent',
        patterns: [
          'live agent', 'human', 'real person', 'talk to someone', 'support person',
          'customer service', 'representative'
        ],
        responses: [
          'Absolutely - I can connect you with a live agent. Tap "Talk to a Live Agent" below, or email info@esp-inc.com.',
          'Yes - if you prefer a human, use the "Talk to a Live Agent" button in this chat and we will route you to support.',
          'You can speak with a live agent by clicking the "Talk to a Live Agent" option below.'
        ]
      }
    ];

    const SUPPORT_CASES = [
      {
        id: 'workbook_separate_purchase',
        patterns: [
          'purchase workbook separately', 'buy workbook separately', 'can i buy just the workbook',
          'workbook only', 'without webinar workbook', 'buy workbook alone'
        ],
        responses: [
          'Workbook-only purchases may be available if stock remains (typically prior-year versions). The price is the same as full course registration.'
        ]
      },
      {
        id: 'pending_purchase_declined',
        patterns: [
          'purchase pending', 'charged twice', 'ordered twice', 'double charge',
          'no email confirmation', 'transaction pending', 'ip shipping mismatch', 'declined payment'
        ],
        responses: [
          'If an order shows pending/duplicate with no confirmation email, it is often a declined transaction. One known cause is IP-to-shipping mismatch (for example, non-US IP with US shipping). Retry from a matching location/network and contact ESP at info@esp-inc.com so they can confirm only one successful order.'
        ]
      },
      {
        id: 'cme_certificate_missing',
        patterns: [
          'did not get cme', 'no cme certificate', 'sdms does not see credits', 'need cme copy',
          'certificate not showing', 'where is my cme certificate', 'where is my certificate',
          'how do i find my cme certificate'
        ],
        responses: [
          'CME certificates are hosted in SDMS and instructions are sent in the weeks after the webinar (typically around 2 weeks). Sign in with the webinar email, go to Learning tab > My SDMS Tracker > Go to Your Learning Center > Completed to download/print. For email updates, contact SDMS at learning@sdms.org or 214-473-8057.'
        ]
      },
      {
        id: 'workbook_early_shipping',
        patterns: [
          'ship workbook early', 'early workbook', 'can i get workbook sooner', 'head start with workbook',
          'workbook printing process'
        ],
        responses: [
          'ESP ships in registration order once the current edition is printed and ready. Tracking is sent to your ESP account email from Stamps.com. If you do not see it, check spam/junk.'
        ]
      },
      {
        id: 'webinar_virtual_and_echo_guidance',
        patterns: [
          'is it virtual', 'in person or webinar', 'do i need to show up', 'cci exam echo course',
          'which echo course for cci'
        ],
        responses: [
          'ESP seminars are webinars (virtual), so no in-person attendance is required. For CCI RCS prep, students usually take Adult Echocardiography, and many pair it with SPI to match exam outline coverage.'
        ]
      },
      {
        id: 'xzone_extension',
        patterns: [
          'x-zone extension', 'extend xzone', 'extend course access', 'need extension until exam',
          'upcoming exam date extension', 'xzone extension', 'x zone extension', 'can i get an xzone extension'
        ],
        responses: [
          'ESP can provide a complimentary one-time extension (up to 6 weeks) with proof of an upcoming scheduled exam. Send exam confirmation showing your name, course, and exam date.'
        ]
      },
      {
        id: 'webinar_join_instructions',
        patterns: [
          'join webinar', 'zoom link', 'meeting id', 'where do i click join', 'dashboard join button',
          'log on to webinar', 'log in to webinar', 'login to webinar', 'sign in to webinar'
        ],
        responses: [
          'Log in to your ESP account and open your dashboard. Under Webinars, find your upcoming session (the webinar block for your course) — you should see a Join option that opens Zoom in your browser or app. About 30 minutes before start, the Join button typically turns green. ESP also emails information about the webinar and how to join a few days before the event.'
        ]
      }
    ];

    function normalizeText(text) {
      return text
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')

        .replace(/\bwhats\b/g, 'what')
        .replace(/\bwheres\b/g, 'where')
        .replace(/\bquiz cares\b/g, 'quiz cards')
        .trim();
    }

    /**
     * Collapse “r e fund” / “c a r d s” style spacing so intent handlers still match.
     * Only a small whitelist — not open-ended spelling correction.
     */
    function collapseSpacedTypos(normalized) {
      if (!normalized) return normalized;
      let t = normalized;
      t = t.replace(/\br\s+e\s+fund\b/g, 'refund');
      t = t.replace(/\br\s+e\s+f\s+u\s+n\s+d\b/g, 'refund');
      t = t.replace(/\bref\s+u\s+n\s*d\b/g, 'refund');
      t = t.replace(/\bref\s+u\s+nd\b/g, 'refund');
      t = t.replace(/\bc\s+a\s+r\s+d\s+s\b/g, 'cards');
      t = t.replace(/\bc\s+a\s+r\s+e\s*s\b/g, 'cards');
      t = t.replace(/\bca\s+res\b/g, 'cards');
      return t.replace(/\s+/g, ' ').trim();
    }

    /** True when the message looks like letters split by spaces (easy to mis-route in KB). */
    function seemsFragmentaryLetterSpacing(normalized) {
      const tokens = normalized.split(' ').filter(Boolean);
      if (tokens.length < 5) return false;
      const singleLetter = tokens.filter(
        (tok) => tok.length === 1 && /[a-z]/.test(tok) && tok !== 'a' && tok !== 'i'
      ).length;
      return singleLetter >= 2;
    }

    function tokenize(text) {
      return normalizeText(text)
        .split(' ')
        .filter((token) => token && !STOP_WORDS.has(token));
    }

    /** Tokenize an already-normalized + paraphrased string (keeps routing and tokens aligned). */
    function tokenizeFromNormalized(normalized) {
      return normalized
        .split(' ')
        .filter((token) => token && !STOP_WORDS.has(token));
    }

    function seemsGibberish(text) {
      const normalized = normalizeText(text);
      if (!normalized) return true;
      if (normalized.length <= 2) return false;
      const compact = normalized.replace(/\s/g, '');
      // Short inputs like "for msk" look low-vowel but are valid follow-ups.
      if (compact.length <= 14) return false;
      const vowels = normalized.match(/[aeiou]/g) || [];
      const vowelRatio = vowels.length / compact.length;
      return vowelRatio < 0.18 && compact.length > 6;
    }

    function scorePattern(userNormalized, userTokens, pattern) {
      const patternNormalized = normalizeText(pattern);
      const patternTokens = tokenize(pattern);

      let score = 0;

      if (userNormalized.includes(patternNormalized)) score += 5;

      for (const token of patternTokens) {
        if (userTokens.includes(token)) score += 1.2;
      }

      const overlap = patternTokens.filter((t) => userTokens.includes(t)).length;
      if (patternTokens.length > 0) {
        score += (overlap / patternTokens.length) * 2.4;
      }

      return score;
    }

    /** 1 / 5 / 15-day X-ZONE subscription tier from user text (null if unclear). */

      if (/\b5\s*day\b/.test(userNormalized) || /\bfive day\b/.test(userNormalized)) return '5';
      if (/\b1\s*day\b/.test(userNormalized) || /\bone day\b/.test(userNormalized)) return '1';

    function getSupportCaseReply(userNormalized, userTokens) {
      let best = null;

      for (const entry of SUPPORT_CASES) {
        let entryScore = 0;
        let hadDirectPhraseMatch = false;
        for (const pattern of entry.patterns) {
          const patternNormalized = normalizeText(pattern);
          const score = scorePattern(userNormalized, userTokens, pattern);
          if (userNormalized.includes(patternNormalized)) hadDirectPhraseMatch = true;
          entryScore = Math.max(entryScore, score);
        }
        const overlapCount = tokenize(entry.patterns.join(' '))
          .filter((t) => userTokens.includes(t)).length;
        // Avoid broad false positives from single shared words like "webinar".
        if (!hadDirectPhraseMatch && overlapCount < 2) continue;
        if (entryScore > bestScore) {
          bestScore = entryScore;
          best = entry;
        }
      }

      if (!best || bestScore < 3.0) return null;
      const choices = best.responses || [];
      if (choices.length === 0) return null;
      const cursor = responseCursorByIntent[best.id] || 0;
      const reply = choices[cursor % choices.length];
      responseCursorByIntent[best.id] = cursor + 1;
      return { text: reply, showLiveAgent: false, intent: best.id };

    function findCourseKey(userNormalized, userTokens = []) {

        for (const alias of aliases) {
          const aliasNormalized = normalizeText(alias);
          // Short aliases like "ab", "ae", "ob" should only match as full tokens,
          // otherwise words like "about" incorrectly match "ab".
          if (aliasNormalized.length <= 3 && !aliasNormalized.includes(' ')) {
            if (userTokens.includes(aliasNormalized)) return key;

            return key;

    function findMonthKey(userNormalized) {
      const monthNames = {
        january: 'jan', jan: 'jan',
        february: 'feb', feb: 'feb',
        march: 'mar', mar: 'mar',
        april: 'apr', apr: 'apr',
        may: 'may',
        june: 'jun', jun: 'jun',
        july: 'jul', jul: 'jul',
        august: 'aug', aug: 'aug',
        september: 'sep', sep: 'sep',
        october: 'oct', oct: 'oct',
        november: 'nov', nov: 'nov',
        december: 'dec', dec: 'dec'
      };
      for (const [token, month] of Object.entries(monthNames)) {
        if (userNormalized.includes(token)) return month;
      }
      return null;
    }

    function getCurrentMonthKey() {
      const idx = new Date().getMonth();
      return MONTH_ORDER[idx] || 'jan';
    }

    function getMonthRangeDays(monthKey) {
      const label = MONTH_LABEL[monthKey] || '';
      const match = label.match(/(\d+)\s*-\s*(\d+)/);
      if (!match) return { startDay: 1, endDay: 31 };
      return { startDay: Number(match[1]), endDay: Number(match[2]) };
    }

    function getNextOfferedSession(course, referenceDate = new Date()) {
      const currentMonthIdx = referenceDate.getMonth();
      const currentDay = referenceDate.getDate();

      for (const monthKey of MONTH_ORDER) {
        const time = SCHEDULE_BY_MONTH[monthKey]?.[course];
        if (!time) continue;

        const sessionMonthIdx = MONTH_TO_INDEX[monthKey];
        const { endDay } = getMonthRangeDays(monthKey);

        // Future months in current year are valid.
        if (sessionMonthIdx > currentMonthIdx) return { month: monthKey, time };
        // Current month is valid only if session has not ended yet.
        if (sessionMonthIdx === currentMonthIdx && endDay >= currentDay) return { month: monthKey, time };
      }

      // If no remaining session this year, return the first available next year.
      for (const monthKey of MONTH_ORDER) {
        const time = SCHEDULE_BY_MONTH[monthKey]?.[course];
        if (time) return { month: monthKey, time };
      }

      return null;
    }

        return {
          text: CLARIFY_REPHRASE_MISSPELLING,
          showLiveAgent: true,
          clarifyOptions: []
        };
      }
      const choices = bestEntry.responses || (bestEntry.answer ? [bestEntry.answer] : []);
      if (choices.length === 0) {
        return { text: FALLBACK_ANSWER, showLiveAgent: true };
      }
      const cursor = responseCursorByIntent[bestEntry.id] || 0;
      const reply = choices[cursor % choices.length];
      responseCursorByIntent[bestEntry.id] = cursor + 1;
      if (bestEntry.id === 'next_webinar') {
        // Treat generic "next webinar" replies as schedule context so follow-ups like
        // "for msk" can inherit intent and resolve correctly.
        conversationState.lastIntent = 'schedule';
        conversationState.lastAskedNextWebinar = true;
        conversationState.lastTopic = 'next_webinar';
        conversationState.lastActionTarget = null;
      } else {
        conversationState.lastIntent = bestEntry.id;
        conversationState.lastAskedNextWebinar = false;
        conversationState.lastTopic = bestEntry.id;
        conversationState.lastActionTarget =
          bestEntry.id === 'after_pass' || bestEntry.id === 'contact' || bestEntry.id === 'live_agent'
            ? 'info@esp-inc.com'
            : null;
      }
      return {
        text: reply,
        showLiveAgent: bestEntry.id === 'live_agent',
        clarifyOptions: []
      };
    }

    async function sendMessage() {
      if (isLoading) return;

      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      isLoading = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('suggestions').style.display = 'none';

      appendMessage('user', text);
      showTyping();

      try {
        await new Promise((resolve) => setTimeout(resolve, 350));
        const reply = getBotReply(text);

        removeTyping();
        appendMessage('bot', reply.text, {
          showLiveAgent: reply.showLiveAgent,
          clarifyOptions: reply.clarifyOptions || []
        });
      } catch (err) {
        removeTyping();
        appendMessage('bot', `Sorry, something went wrong: ${err.message}.`);
      }

      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }

    initializeBotAvatars();
  </script>
